spring:
  application:
    name: sql-insight-example
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

sql-insight:
  enabled: true
  dashboard-enabled: true
  slow-query-threshold: 200
  max-queries: 1000
  detect-nplus1: true

logging:
  level:
    root: INFO
    io.sqlinsight: DEBUG
    org.hibernate.SQL: DEBUG
